models:

  LogisticRegression:
    C: [0.01, 0.1, 1, 10]
    solver: ["liblinear", "lbfgs"]
    max_iter: 1000

  DecisionTree:
    max_depth: [3, 5, 7, null]
    min_samples_split: [2, 5, 10]

  RandomForest:
    n_estimators: [100, 200, 300]
    max_depth: [5, 10, null]
    min_samples_split: [2, 8, 15]
    max_features: [5, 7, 8]

  GradientBoost:
    n_estimators: [50, 100, 200]
    learning_rate: [0.01, 0.1, 0.2]
    max_depth: [3, 5]

  IsolationForest:
    contamination: auto