# config/schema.yaml
# ------------------
# Defines the expected raw columns and target.
# data_validation.validate_data() checks against this before any processing.
#
# NOTE: RR_3hr, RR_6hr, RR_12hr, rain_intensity, dRR are listed here
#       because they ARE present in the raw CSV.
#       They are flagged and removed by the leakage audit in data_ingestion.py
#       AFTER validation — not here.

target_column: flash_flood

columns:
  Rain_Flag:         float
  Pressure_hPa:      float
  Temperature_K:     float
  Relative_Humidity: float
  Wind_Speed_kmh:    float
  Wind_Direction_deg: float
  Rain_Rate_mmph:    float
  LWP:               float
  Elevation_Angle:   float
  Azimuth_Angle:     float
  IWV:               float
  IRT1:              float
  RR_3hr:            float   # leakage suspect — removed post-validation
  RR_6hr:            float   # leakage suspect — removed post-validation
  RR_12hr:           float   # leakage suspect — removed post-validation
  rain_intensity:    float   # leakage suspect — removed post-validation
  dRR:               float   # leakage suspect — removed post-validation
  Temp_C:            float
  dT:                float
  dP:                float
  P_3hr_drop:        float
  dWind:             float
  dLWP:              float
  dIWV:              float
  dIRT:              float
  dIWV_1h:           float
  dLWP_1h:           float
  dIRT_1h:           float
  dP_1h:             float
  dWind_1h:          float

leakage_suspects:
  - RR_3hr
  - RR_6hr
  - RR_12hr
  - rain_intensity
  - dRR

safe_features:
  - Rain_Flag
  - Pressure_hPa
  - Temperature_K
  - Relative_Humidity
  - Wind_Speed_kmh
  - Wind_Direction_deg
  - Rain_Rate_mmph
  - LWP
  - Elevation_Angle
  - Azimuth_Angle
  - IWV
  - IRT1
  - Temp_C
  - dT
  - dP
  - P_3hr_drop
  - dWind
  - dLWP
  - dIWV
  - dIRT
  - dIWV_1h
  - dLWP_1h
  - dIRT_1h
  - dP_1h
  - dWind_1h
