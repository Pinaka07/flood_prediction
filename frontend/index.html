<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flood Prediction App</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.container{
background:#1e293b;
padding:30px;
border-radius:12px;
width:400px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}
h2{text-align:center;}
input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}
button{
width:100%;
padding:10px;
margin-top:10px;
background:#22c55e;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}
button:hover{background:#16a34a;}
.result{
margin-top:15px;
text-align:center;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">
<h2>Flood Prediction</h2>

<!-- Minimal inputs (you can expand later) -->
<input id="Rain_Flag" placeholder="Rain Flag (0/1)">
<input id="Pressure_hPa" placeholder="Pressure">
<input id="Temperature_K" placeholder="Temperature">
<input id="Relative_Humidity" placeholder="Humidity">

<button onclick="predict()">Predict</button>

<div class="result" id="result"></div>
</div>

<script>
async function predict(){

const data={
Rain_Flag:parseFloat(document.getElementById("Rain_Flag").value),
Pressure_hPa:parseFloat(document.getElementById("Pressure_hPa").value),
Temperature_K:parseFloat(document.getElementById("Temperature_K").value),
Relative_Humidity:parseFloat(document.getElementById("Relative_Humidity").value),

// 👉 Fill defaults for remaining features
Wind_Speed_kmh:10,
Wind_Direction_deg:180,
Rain_Rate_mmph:2,
LWP:0.2,
Elevation_Angle:30,
Azimuth_Angle:50,
IWV:20,
IRT1:250,
RR_3hr:2,
RR_6hr:3,
RR_12hr:4,
rain_intensity:1,
dRR:0.1,
Temp_C:27,
dT:0.5,
dP:1,
P_3hr_drop:2,
dWind:0.3,
dLWP:0.1,
dIWV:0.2,
dIRT:0.1,
dIWV_1h:0.2,
dLWP_1h:0.1,
dIRT_1h:0.1,
dP_1h:0.5,
dWind_1h:0.3
};

const res=await fetch("https://your-app.onrender.com/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const result=await res.json();

document.getElementById("result").innerText=
"Prediction: "+result.prediction+
(result.probability?(" | Prob: "+result.probability.toFixed(2)):"");
}
</script>

</body>
</html>
